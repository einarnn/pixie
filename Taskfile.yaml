# https://taskfile.dev

version: '3'

tasks:

  default:
    # deps: [pixiectl, basic]
    deps: [pixiectl]

  pixiectl:
    cmds:
      - go build -o bin/{{.TASK}} ./cmd/{{.TASK}}/
      
  pixiectl-run:
    cmds:
      - go run ./cmd/{{.TASK | replace "-run" ""}}/

  pixiectl-image:
    desc: Build a local pixiectl scratch image for the current architecture
    cmds:
      - docker build -t {{.IMAGE | default "pixiectl:latest"}} .
      
